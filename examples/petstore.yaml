openapi: 3.0.3
info:
  title: Petstore API
  version: 1.0.0
paths:
  /pets:
    get:
      tags: [pets]
      responses:
        '200':
          description: A list of pets.
    post:
      tags: [pets]
      responses:
        '201':
          description: The created pet.
  /pets/{petId}:
    get:
      operationId: getPetById
      tags: [pets]
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: A pet.
components:
  securitySchemes:
    legacyAuth:
      type: http
      scheme: basic
